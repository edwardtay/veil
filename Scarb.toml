[package]
name = "veil"
version = "0.1.0"
edition = "2024_07"

[dependencies]
starknet = "2.14.0"
garaga = { git = "https://github.com/keep-starknet-strange/garaga.git", tag = "v1.0.1" }
openzeppelin_access = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", tag = "v1.0.0" }
openzeppelin_token = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", tag = "v1.0.0" }
openzeppelin_security = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", tag = "v1.0.0" }

[dev-dependencies]
snforge_std = "0.53.0"
assert_macros = "2.14.0"

[cairo]
sierra-replace-ids = false
inlining-strategy = 2

[[target.starknet-contract]]
sierra = true
casm = true
casm-add-pythonic-hints = true

[scripts]
test = "snforge test"

[tool.scarb]
allow-prebuilt-plugins = ["snforge_std"]

[tool.snforge]
exit_first = true
